services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - .:/service
    depends_on:
      - postgres
      - redis

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: celery -A app.celery_app.celery_app worker --loglevel=info
    env_file:
      - .env
    volumes:
      - .:/service
    depends_on:
      - postgres
      - redis

  beat:
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: celery -A app.celery_app.celery_app beat --loglevel=info
    env_file:
      - .env
    volumes:
      - .:/service
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ai_blog_automation
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  postgres_data:
